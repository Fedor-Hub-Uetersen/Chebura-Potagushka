<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChebuYoga — Tech.chebur.shop</title>
    <style>
        :root { --bg: #0a0a0c; --card: #121216; --text: #ffffff; --accent: #ff5500; --music: #00ff66; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--accent); width: 320px; }
        .timer { font-size: 60px; font-weight: bold; margin: 20px 0; color: #fff; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.active { display: flex; }
        .btn { padding: 15px 30px; border-radius: 25px; border: 2px solid var(--accent); background: none; color: #fff; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Время работать</h1>
        <div class="timer" id="timer-display">01:00</div>
    </div>

    <div class="overlay" id="overlay">
        <h2 style="color:var(--music)">Время разминки!</h2>
        <button class="btn" id="s-btn">Вернуться в суету</button>
    </div>

    <script>
        const WORK_TIME = 60; // 60 секунд
        let timeLeft = WORK_TIME;
        let mode = 'work'; // 'work' или 'rest'
        const display = document.getElementById('timer-display');
        const overlay = document.getElementById('overlay');

        function update() {
            timeLeft--;
            
            if (timeLeft < 0) {
                if (mode === 'work') {
                    mode = 'rest';
                    timeLeft = 120; // 2 минуты отдыха
                    overlay.classList.add('active');
                } else {
                    mode = 'work';
                    timeLeft = WORK_TIME;
                    overlay.classList.remove('active');
                }
            }

            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // Кнопка возврата
        document.getElementById('s-btn').onclick = function() {
            mode = 'work';
            timeLeft = WORK_TIME;
            overlay.classList.remove('active');
        };

        // Запуск цикла с защитой от "засыпания"
        setInterval(update, 1000);
    </script>
</body>
</html>
