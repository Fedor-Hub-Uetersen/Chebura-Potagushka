<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChebuYoga — Tech.chebur.shop</title>
    <style>
        :root { 
            --bg: #0a0a0c; 
            --card: #121216; 
            --text: #ffffff; 
            --accent: #ff5500; 
            --music: #00ff66;  
            --neon-glow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            --neon-music: 0 0 15px var(--music);
            --neon-footer: 0 0 6px var(--accent);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .container { 
            position: relative;
            text-align: center; 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(255, 85, 0, 0.2), inset 0 0 15px rgba(255, 85, 0, 0.1); 
            width: 380px; 
        }

        .lang-switcher { position: absolute; top: 15px; left: 20px; display: flex; gap: 8px; }
        .lang-btn { background: #1a1a24; border: 1px solid #444; color: #8a8a93; padding: 3px 8px; font-size: 11px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .lang-btn.active { border-color: var(--music); color: #fff; box-shadow: 0 0 5px var(--music); }

        .streak-counter { position: absolute; top: 15px; right: 20px; font-size: 11px; font-weight: bold; color: var(--music); text-shadow: 0 0 5px var(--music); text-transform: uppercase; }

        .logo-area { margin-bottom: 20px; }
        .wolf-logo-placeholder { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #fff; text-shadow: var(--neon-glow); border: 1px dashed rgba(255, 85, 0, 0.4); padding: 10px 20px; border-radius: 10px; text-transform: uppercase; }

        h1 { font-size: 24px; color: #fff; text-shadow: var(--neon-glow); margin: 15px 0 5px 0; text-transform: uppercase; }
        .timer { font-size: 68px; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px #fff; }
        .status { font-size: 14px; color: #8a8a93; letter-spacing: 1px; text-transform: uppercase; }
        
        .sound-selector { margin: 15px 0 5px 0; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .sound-selector label { font-size: 11px; color: #8a8a93; text-transform: uppercase; }
        .sound-selector select { background: #1a1a24; color: #fff; border: 1px solid var(--accent); padding: 6px 12px; border-radius: 10px; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(6, 6, 8, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .my-video { width: 340px; height: 190px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .speech { font-style: italic; color: #ffaa66; font-size: 18px; margin-bottom: 15px; }
        .exercises { text-align: left; font-size: 16px; line-height: 1.6; margin-bottom: 20px; color: #e1e1e6; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { background: transparent; color: #fff; border: 2px solid var(--accent); padding: 12px 25px; border-radius: 25px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn-m { border-color: var(--music); }
        .footer-credits { margin-top: 25px; font-size: 11px; color: #bbb; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn active" id="lang-ru">RU</button>
            <button class="lang-btn" id="lang-de">DE</button>
        </div>
        <div class="streak-counter" id="streak-display">Bio-Score: 0</div>
        <div class="logo-area"><div class="wolf-logo-placeholder">TECH.CHEBUR.SHOP</div></div>

        <h1 id="main-title">Время работать ✨</h1>
        <div class="status" id="status-text">До разминки осталось:</div>
        <div class="timer" id="w-timer">01:00</div>
        
        <div class="sound-selector">
            <label for="alarm-sound-select" id="sound-label">🔔 Сигнал разминки:</label>
            <select id="alarm-sound-select">
                <option value="digital.mp3" id="opt-dig">Цифровой сигнал</option>
                <option value="gong.mp3" id="opt-gong" selected>Космический гонг</option>
                <option value="bowl.mp3" id="opt-bowl">Тибетская чаша</option>
            </select>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="content" style="display: flex; flex-direction: column; align-items: center;">
            <video class="my-video" id="yoga-video" controls loop muted>
                <source src="video.mp4" type="video/mp4">
            </video>
            <h2 id="rest-title" style="color: #fff;">Время разминки! 🧘‍♂️</h2>
            <div class="speech" id="rest-speech">«Вдохни и расправь плечи!»</div>
            <div class="timer" id="r-timer" style="color: var(--music);">02:00</div>
            <ul class="exercises" id="exercises-list"></ul>
            <div class="btn-group">
                <button class="btn btn-m" id="m-btn">Музыка</button>
                <button class="btn" id="s-btn">Вернуться</button>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            ru: {
                mainTitle: "Время работать ✨",
                statusText: "До разминки осталось:",
                soundLabel: "🔔 Сигнал разминки:",
                optDig: "Цифровой сигнал", optGong: "Космический гонг", optBowl: "Тибетская чаша",
                restTitle: "Время разминки! 🧘‍♂️",
                restSpeech: "«Ген, заbasic-уйся... Вдохни поглубже и расправь плечи!»",
                btnMusicOn: "🎵 Музыка релакс", btnMusicOff: "⏸ Пауза",
                btnReturn: "Вернуться в суету",
                notifTitle: "Чебурашка зовёт!", notifBody: "Друг, пора размяться!",
                exercises: ["👀 Глаза: Посмотри в окно вдаль.", "🧘‍♂️ Спина: Потянись лапами вверх.", "💧 Вода: Сделай глоток воды."]
            },
            de: {
                mainTitle: "Zeit zu arbeiten ✨",
                statusText: "Bis zur Pause:",
                soundLabel: "🔔 Pausensignal:",
                optDig: "Digitaler Alarm", optGong: "Weltraum-Gong", optBowl: "Tibetische Schale",
                restTitle: "Zeit für die Pause! 🧘‍♂️",
                restSpeech: "«Gena, entbasic-e dich... Atme tief ein und strecke dich!»",
                btnMusicOn: "🎵 Relax-Musik", btnMusicOff: "⏸ Pause",
                btnReturn: "Zurück zur Arbeit",
                notifTitle: "Tscheburaschka ruft!", notifBody: "Friend, Zeit für eine Pause!",
                exercises: ["👀 Augen: In die Ferne schauen.", "🧘‍♂️ Rücken: Aufrecht hinstrecken.", "💧 Wasser: Etwas Wasser trinken."]
            }
        };

        let currentLang = localStorage.getItem('chebu_lang') || 'ru';
        
        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('chebu_lang', lang);
            document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('lang-de').classList.toggle('active', lang === 'de');

            document.getElementById('main-title').innerText = i18n[lang].mainTitle;
            document.getElementById('status-text').innerText = i18n[lang].statusText;
            document.getElementById('sound-label').innerText = i18n[lang].soundLabel;
            document.getElementById('opt-dig').innerText = i18n[lang].optDig;
            document.getElementById('opt-gong').innerText = i18n[lang].optGong;
            document.getElementById('opt-bowl').innerText = i18n[lang].optBowl;
            document.getElementById('rest-title').innerText = i18n[lang].restTitle;
            document.getElementById('rest-speech').innerText = i18n[lang].restSpeech;
            document.getElementById('m-btn').innerText = i18n[lang].btnMusicOn;
            document.getElementById('s-btn').innerText = i18n[lang].btnReturn;

            const exList = document.getElementById('exercises-list');
            exList.innerHTML = "";
            i18n[lang].exercises.forEach(text => {
                const li = document.createElement('li');
                li.innerText = text;
                exList.appendChild(li);
            });
        }

        document.getElementById('lang-ru').addEventListener('click', () => applyLanguage('ru'));
        document.getElementById('lang-de').addEventListener('click', () => applyLanguage('de'));
        applyLanguage(currentLang);
    </script>
</body>
</html>
