<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChebuYoga</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #ff9800; --music: #4caf50; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 360px; }
        h1 { font-size: 24px; color: var(--accent); margin: 0 0 10px 0; }
        .timer { font-size: 64px; font-weight: bold; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .status { font-size: 16px; color: #aaa; }
        
        /* Блок селекторов */
        .selectors-group { margin: 15px 0 5px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .selector-item { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; }
        .selector-item label { font-size: 11px; color: #8a8a93; text-transform: uppercase; letter-spacing: 1px; }
        .selectors-group select { background: #1a1a24; color: #fff; border: 1px solid var(--accent); padding: 6px 12px; border-radius: 10px; font-size: 13px; cursor: pointer; outline: none; width: 80%; text-align: center; }

        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(25, 18, 12, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .content { text-align: center; max-width: 600px; padding: 20px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        .my-video { width: 320px; height: 180px; border-radius: 15px; box-shadow: 0 0 25px rgba(255, 152, 0, 0.3); margin-bottom: 15px; background: #000; }
        .speech { font-style: italic; color: #ffcc80; font-size: 18px; margin-bottom: 15px; }
        .exercises { text-align: left; font-size: 18px; line-height: 1.5; margin-bottom: 20px; width: 100%; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .btn { background: transparent; color: #ffcc80; border: 2px solid var(--accent); padding: 12px 25px; font-size: 16px; border-radius: 25px; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent); color: #121212; transform: scale(1.05); }
        .btn-m { border-color: var(--music); color: #a5d6a7; min-width: 220px; }
        .btn-m:hover { background: var(--music); color: #121212; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Время работать ✨</h1>
        <div class="status" id="status-text">До разминки осталось:</div>
        <div class="timer" id="w-timer">01:00</div>
        
        <div class="selectors-group">
            <!-- ДЕНЬ НЕДЕЛИ ДЛЯ СТАРТА -->
            <div class="selector-item">
                <label for="start-day-select">📅 День для зарядки:</label>
                <select id="start-day-select">
                    <option value="all">Каждый день (Всегда активна)</option>
                    <option value="1">Понедельник</option>
                    <option value="2">Вторник</option>
                    <option value="3">Среда</option>
                    <option value="4">Четверг</option>
                    <option value="5">Пятница</option>
                    <option value="6">Суббота</option>
                    <option value="0">Воскресенье</option>
                </select>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="content">
            <video class="my-video" id="yoga-video" controls preload="auto" loop muted>
                <source src="video.mp4" type="video/mp4">
                Ваш browser не поддерживает видео.
            </video>
            
            <h2>Время разминки! 🧘‍♂️</h2>
            <div class="speech">«Ген, заbasic-уйся... Вдохни поглубже и расправь плечи!»</div>
            <div class="timer" id="r-timer" style="color: var(--accent);">02:00</div>
            
            <ul class="exercises">
                <li>👀 <strong>Глаза:</strong> Закрой глаза на 10 секунд, посмотри в окно вдаль.</li>
                <li>🧘‍♂️ <strong>Спина:</strong> Встань ровно, потянись лапами вверх.</li>
                <li>💧 <strong>Вода:</strong> Сделай пару глотков чистой воды.</li>
            </ul>

            <div class="btn-group">
                <button class="btn btn-m" id="m-btn">🎵 Включить музыку релакс</button>
                <button class="btn" id="s-btn">Вернуться в суету</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" preload="auto" loop></audio>

    <script>
        const WORK_DURATION = 60;   
        const REST_DURATION = 120;  
        const MUSIC_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";

        let timer = null;
        let notificationSent = false;
        const wEl = document.getElementById('w-timer');
        const rEl = document.getElementById('r-timer');
        const ovEl = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const musicAudio = document.getElementById('bg-music');
        const videoPlayer = document.getElementById('yoga-video');
        const musicBtn = document.getElementById('m-btn');
        const daySelect = document.getElementById('start-day-select');
        
        musicAudio.src = MUSIC_URL;

        // Восстановление сохраненного дня недели
        if (localStorage.getItem('chebu_weekday')) {
            daySelect.value = localStorage.getItem('chebu_weekday');
        }

        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        function format(seconds) {
            if (seconds < 0) seconds = 0;
            return `${Math.floor(seconds/60).toString().padStart(2,'0')}:${(seconds%60).toString().padStart(2,'0')}`;
        }

        function sendNotification(title, body) {
            if (Notification.permission === "granted" && !notificationSent) {
                new Notification(title, { body: body });
                notificationSent = true;
            }
        }

        function updateTimer() {
            // ПРОВЕРКА ТЕКУЩЕГО ДНЯ НЕДЕЛИ
            const currentWeekday = new Date().getDay(); // 0 = Воскресенье, 1 = Понедельник...
            const selectedValue = daySelect.value;

            if (selectedValue !== "all" && parseInt(selectedValue) !== currentWeekday) {
                // Если выбран конкретный день и он не совпадает с сегодняшним
                const dayNames = {
                    "1": "Понедельника", "2": "Вторника", "3": "Среды", 
                    "4": "Четверга", "5": "Пятницы", "6": "Субботы", "0": "Воскресенья"
                };
                statusText.innerText = `Ожидание старта в ${dayNames[selectedValue]}...`;
                wEl.innerText = "--:--";
                ovEl.classList.remove('active');
                return;
            }

            // Обычная работа таймера, если день совпал
            statusText.innerText = "До разминки осталось:";

            const now = Math.floor(Date.now() / 1000);
            let endTime = parseInt(localStorage.getItem('chebu_endTime'));
            let mode = localStorage.getItem('chebu_mode');

            if (!endTime || !mode) {
                localStorage.setItem('chebu_mode', 'work');
                localStorage.setItem('chebu_endTime', now + WORK_DURATION);
                mode = 'work';
                endTime = now + WORK_DURATION;
            }

            let timeLeft = endTime - now;

            if (timeLeft <= 0) {
                if (mode === 'work') {
                    localStorage.setItem('chebu_mode', 'rest');
                    localStorage.setItem('chebu_endTime', now + REST_DURATION);
                    ovEl.classList.add('active');
                    wEl.innerText = format(0);
                    rEl.innerText = format(REST_DURATION);
                    
                    videoPlayer.play().catch(e => console.log("Браузер ждет клика"));
                    sendNotification("Чебурашка зовёт!", "Фёдор, пора делать разминку!");
                } else {
                    startWorkMode();
                }
            } else {
                if (mode === 'work') {
                    if (ovEl.classList.contains('active')) ovEl.classList.remove('active');
                    wEl.innerText = format(timeLeft);
                    notificationSent = false;
                } else {
                    if (!ovEl.classList.contains('active')) ovEl.classList.add('active');
                    rEl.innerText = format(timeLeft);
                }
            }
        }

        function startWorkMode() {
            const now = Math.floor(Date.now() / 1000);
            localStorage.setItem('chebu_mode', 'work');
            localStorage.setItem('chebu_endTime', now + WORK_DURATION);
            ovEl.classList.remove('active');
            
            musicAudio.pause();
            musicAudio.currentTime = 0;
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
            musicBtn.innerText = "🎵 Включить музыку релакс";
            
            wEl.innerText = format(WORK_DURATION);
            notificationSent = false;
        }

        // Следим за изменениями в выпадающем списке
        daySelect.addEventListener('change', () => {
            localStorage.setItem('chebu_weekday', daySelect.value);
            // Если переключили на "Каждый день" или попали на текущий день недели — перезапускаем таймер на 1 минуту
            const currentWeekday = new Date().getDay();
            if (daySelect.value === "all" || parseInt(daySelect.value) === currentWeekday) {
                startWorkMode();
            }
            updateTimer();
        });

        clearInterval(timer);
        timer = setInterval(updateTimer, 1000);
        updateTimer();

        musicBtn.addEventListener('click', () => {
            if (musicAudio.paused) {
                musicAudio.play()
                    .then(() => { musicBtn.innerText = "⏸ Поставить на паузу"; })
                    .catch(e => console.log("Звук заблокирован"));
            } else {
                musicAudio.pause();
                musicBtn.innerText = "🎵 Включить музыку релакс";
            }
        });

        document.getElementById('s-btn').addEventListener('click', startWorkMode);
    </script>
</body>
</html>
